name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_LOG: warn

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: edu-conect-rural-server

    steps:
      - uses: actions/checkout@v4

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            edu-conect-rural-server/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('edu-conect-rural-server/Cargo.lock') }}

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config

      - name: Check formatting
        run: cargo fmt --check

      - name: Run clippy
        run: cargo clippy -- -D warnings

      - name: Build
        run: cargo build --release

      - name: Run tests
        run: cargo test --test integration_test -- --nocapture

  docker:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t educonect-rural .

      - name: Verify image starts
        run: |
          docker run -d --name educonect-test -p 8080:8080 \
            -e JWT_SECRET=test-secreto-para-ci \
            educonect-rural
          sleep 10
          curl -sf http://localhost:8080/health || exit 1
          echo "✅ Health check passed!"
          docker stop educonect-test
