<!DOCTYPE html>
<html>
<head>
<title>Procedural Goat - Three.js (standalone)</title>
<style>
body { margin: 0; overflow: hidden; background: #1a1a2e; }
#info {
    position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
    color: #fff; font-family: monospace; font-size: 14px;
    background: rgba(0,0,0,0.6); padding: 8px 16px; border-radius: 8px;
    pointer-events: none; z-index: 10;
}
</style>
</head>
<body>
<div id="info">Chivo procedural — LatheGeometry · CatmullRomCurve3 · TubeGeometry · ShapeGeometry</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// --- SCENE SETUP ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);

const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(4, 3, 6);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

// --- LIGHTS ---
const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
dirLight.position.set(5, 10, 7);
dirLight.castShadow = true;
scene.add(dirLight);

const ambLight = new THREE.AmbientLight(0x404060, 0.5);
scene.add(ambLight);

const fillLight = new THREE.DirectionalLight(0xffeedd, 0.3);
fillLight.position.set(-3, 2, -4);
scene.add(fillLight);

// --- BUILD THE GOAT ---
const goat = new THREE.Group();

// --- 1. CUERPO (LatheGeometry) ---
// Perfil lateral: base → vientre → lomo → cuello
const bodyPts = [
    new THREE.Vector2(0, -0.8),
    new THREE.Vector2(0.25, -0.7),
    new THREE.Vector2(0.5, -0.5),
    new THREE.Vector2(0.75, -0.25),
    new THREE.Vector2(0.9, 0.0),
    new THREE.Vector2(1.0, 0.2),
    new THREE.Vector2(0.95, 0.4),
    new THREE.Vector2(0.8, 0.5),
    new THREE.Vector2(0.55, 0.55),
    new THREE.Vector2(0.3, 0.5),
    new THREE.Vector2(0.1, 0.7),
    new THREE.Vector2(0.03, 0.8),
    new THREE.Vector2(0, 0.8)
];
const bodyMat = new THREE.MeshLambertMaterial({ color: 0xc8a882, flatShading: false });
const body = new THREE.Mesh(new THREE.LatheGeometry(bodyPts, 24), bodyMat);
body.scale.set(0.8, 0.8, 1);
body.position.y = 0.4;
goat.add(body);

// --- 2. CABEZA (SphereGeometry deformada) ---
const headMat = new THREE.MeshLambertMaterial({ color: 0xd4b896 });
const head = new THREE.Mesh(new THREE.SphereGeometry(0.28, 12, 10), headMat);
head.position.set(-0.15, 0.9, 0);
head.scale.set(1.2, 0.8, 0.85);
goat.add(head);

// --- 3. HOCICO ---
const snoutMat = new THREE.MeshLambertMaterial({ color: 0xdcc4a4 });
const snout = new THREE.Mesh(new THREE.SphereGeometry(0.1, 8, 8), snoutMat);
snout.position.set(-0.05, 0.82, -0.3);
snout.scale.set(1.4, 0.6, 0.6);
goat.add(snout);

// --- 4. CUELLO (Cylinder inclinado) ---
const neckMat = new THREE.MeshLambertMaterial({ color: 0xc8a882 });
const neck = new THREE.Mesh(new THREE.CylinderGeometry(0.18, 0.3, 0.35, 8), neckMat);
neck.position.set(0.3, 0.7, 0);
neck.rotation.z = -0.4;
neck.rotation.x = 0.05;
goat.add(neck);

// --- 5. PATAS (CylinderGeometry con pezuñas) ---
const legMat = new THREE.MeshLambertMaterial({ color: 0xb8956e });
const hoofMat = new THREE.MeshLambertMaterial({ color: 0x5a4a3a });

function addLeg(x, z, rotZ) {
    const legGroup = new THREE.Group();
    // Pierna
    const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.08, 0.55, 6), legMat);
    leg.position.y = -0.275;
    legGroup.add(leg);
    // Pezuña
    const hoof = new THREE.Mesh(new THREE.SphereGeometry(0.045, 6, 6), hoofMat);
    hoof.position.y = -0.275;
    hoof.scale.set(1, 0.4, 0.8);
    legGroup.add(hoof);
    // Articulación (rodilla)
    const knee = new THREE.Mesh(new THREE.SphereGeometry(0.05, 6, 6), legMat);
    knee.position.y = 0.1;
    legGroup.add(knee);

    legGroup.position.set(x, -0.3, z);
    if (rotZ) legGroup.rotation.z = rotZ;
    goat.add(legGroup);
}

addLeg(0.6, 0.3);
addLeg(0.6, -0.3);
addLeg(-0.45, 0.3, 0.08);
addLeg(-0.45, -0.3, -0.08);

// --- 6. COLA (TubeGeometry + CatmullRomCurve3) ---
const tailPts = [
    new THREE.Vector3(0, 0, 0),
    new THREE.Vector3(-0.08, 0.15, 0.08),
    new THREE.Vector3(-0.2, 0.1, 0.15),
    new THREE.Vector3(-0.25, 0.2, 0.2),
    new THREE.Vector3(-0.3, 0.35, 0.1),
    new THREE.Vector3(-0.25, 0.4, 0.05)
];
const tailCurve = new THREE.CatmullRomCurve3(tailPts);
const tailMat = new THREE.MeshLambertMaterial({ color: 0xc8a882 });
const tail = new THREE.Mesh(new THREE.TubeGeometry(tailCurve, 10, 0.035, 5, false), tailMat);
tail.position.set(-0.85, 0.15, 0);
goat.add(tail);

// --- 7. OREJAS (ShapeGeometry) ---
function addEar(xDir) {
    const earShape = new THREE.Shape();
    earShape.moveTo(0, 0);
    earShape.bezierCurveTo(0.12 * xDir, 0.08, 0.1 * xDir, 0.2, 0, 0.25);
    earShape.bezierCurveTo(-0.05 * xDir, 0.15, -0.04 * xDir, 0.05, 0, 0);

    const earMat = new THREE.MeshLambertMaterial({ color: 0xd4b896, side: THREE.DoubleSide });
    const ear = new THREE.Mesh(new THREE.ShapeGeometry(earShape), earMat);
    ear.position.set(-0.3, 0.98, 0.08 * xDir);
    ear.rotation.y = -0.3 * xDir;
    ear.rotation.x = 0.15;
    ear.rotation.z = 0.1 * xDir;
    goat.add(ear);
}
addEar(1);
addEar(-1);

// --- 8. CUERNOS (Cone curvo con TubeGeometry) ---
function addHorn(xDir) {
    const hornPts = [
        new THREE.Vector3(0, 0, 0),
        new THREE.Vector3(0.05 * xDir, 0.08, 0.02 * xDir),
        new THREE.Vector3(0.12 * xDir, 0.15, 0.05 * xDir),
        new THREE.Vector3(0.15 * xDir, 0.22, 0.03 * xDir),
        new THREE.Vector3(0.1 * xDir, 0.28, 0)
    ];
    const hornCurve = new THREE.CatmullRomCurve3(hornPts);
    const hornMat = new THREE.MeshLambertMaterial({ color: 0x8a7a6a });
    const horn = new THREE.Mesh(new THREE.TubeGeometry(hornCurve, 8, 0.03, 5, false), hornMat);
    horn.position.set(-0.15, 0.98, 0.06 * xDir);
    goat.add(horn);
}
addHorn(1);
addHorn(-1);

// --- 9. OJOS ---
const eyeMat = new THREE.MeshLambertMaterial({ color: 0x222222 });
const pupilMat = new THREE.MeshLambertMaterial({ color: 0x111111 });
const whiteMat = new THREE.MeshLambertMaterial({ color: 0xffffff });

[-1, 1].forEach(side => {
    // Blanco
    const white = new THREE.Mesh(new THREE.SphereGeometry(0.05, 8, 8), whiteMat);
    white.position.set(-0.1, 1.0, 0.17 * side);
    goat.add(white);
    // Pupila
    const pupil = new THREE.Mesh(new THREE.SphereGeometry(0.025, 8, 8), pupilMat);
    pupil.position.set(-0.08, 1.0, 0.19 * side);
    pupil.scale.set(0.6, 1, 0.6);
    goat.add(pupil);
});

// --- 10. BARBA (pequeña TubeGeometry) ---
const beardPts = [
    new THREE.Vector3(0, 0, 0),
    new THREE.Vector3(-0.02, -0.1, 0.01),
    new THREE.Vector3(-0.01, -0.15, 0)
];
const beardCurve = new THREE.CatmullRomCurve3(beardPts);
const beardMat = new THREE.MeshLambertMaterial({ color: 0x9a8a7a });
const beard = new THREE.Mesh(new THREE.TubeGeometry(beardCurve, 5, 0.015, 4, false), beardMat);
beard.position.set(-0.08, 0.7, -0.25);
goat.add(beard);

// --- FINAL SCENE SETUP ---
goat.scale.set(1.8, 1.8, 1.8);
goat.position.y = 0.6;
scene.add(goat);

// --- PISO ---
const floorMat = new THREE.MeshLambertMaterial({ color: 0x556b5a });
const floor = new THREE.Mesh(new THREE.PlaneGeometry(8, 8), floorMat);
floor.rotation.x = -Math.PI / 2;
floor.position.y = -0.4;
floor.receiveShadow = true;
scene.add(floor);

// Shadows on goat meshes
goat.children.forEach(child => {
    if (child.isMesh) {
        child.castShadow = true;
        child.receiveShadow = true;
    }
});

// --- RESIZE ---
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// --- ANIMATION LOOP ---
let time = 0;
function animate() {
    requestAnimationFrame(animate);
    time += 0.01;

    // Suave rotación para visualización
    goat.rotation.y += 0.003;

    renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
