<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>DIG-401: Ciber-Protector | EduConect Rural</title>
<link rel="stylesheet" href="../comun/educonect.css">
<style>
body{background:linear-gradient(180deg,#1a1a2e,#16213e,#0f3460);min-height:100vh;color:#eee}
.container{max-width:500px;margin:0 auto;padding:15px;position:relative;z-index:1}

.header{text-align:center;padding:30px 15px 10px}
.header h1{font-size:clamp(1.6rem,5vw,2.5rem);color:#4fc3f7;text-shadow:0 0 20px rgba(79,195,247,0.3)}
.header .sub{color:#90caf9;font-size:0.9rem}

.instruccion{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:16px;padding:16px 20px;text-align:center;font-size:1rem;line-height:1.6;margin-bottom:16px;backdrop-filter:blur(4px)}

.progreso-wrap{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);border-radius:15px;padding:10px 18px;margin:10px 0 18px;display:flex;align-items:center;gap:12px;backdrop-filter:blur(4px)}
.progreso-label{font-weight:bold;font-size:0.9rem;white-space:nowrap;color:#90caf9}
.progreso-bar{flex:1;height:14px;background:rgba(255,255,255,0.1);border-radius:10px;overflow:hidden}
.progreso-fill{height:100%;border-radius:10px;background:linear-gradient(90deg,#00bcd4,#2196f3);transition:width 0.5s;width:0%}
.progreso-pct{font-weight:bold;color:#4fc3f7;font-size:0.9rem;min-width:36px}

.puntos-display{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);padding:6px 14px;border-radius:12px;font-size:0.9rem}

.telefono{width:280px;height:480px;background:linear-gradient(180deg,#2d3436,#1e272e);border-radius:30px;margin:20px auto;padding:18px;position:relative;box-shadow:0 10px 30px rgba(0,0,0,0.5),inset 0 0 8px rgba(255,255,255,0.1)}
.telefono .notch{position:absolute;top:8px;left:50%;transform:translateX(-50%);width:80px;height:18px;background:#1e272e;border-radius:0 0 12px 12px;z-index:2}
.pantalla{background:#f5f6fa;width:100%;height:100%;border-radius:20px;overflow:hidden;display:flex;flex-direction:color;position:relative;overflow:hidden}
.pantalla .app-header{background:linear-gradient(90deg,#0097e6,#00b894);color:white;padding:14px 12px;text-align:center;font-weight:bold;font-size:0.95rem;display:flex;align-items:center;justify-content:center;gap:6px}
.pantalla .app-header img{width:20px;height:20px}
.mensaje-box{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;text-align:center;font-size:1.05rem;color:var(--tierra);line-height:1.5;gap:12px}
.mensaje-box .remitente{font-size:0.8rem;color:#999;font-weight:bold}
.mensaje-box .burbuja{background:#e8f4fd;border-radius:18px;padding:14px 18px;max-width:100%;border:1px solid #b3e0f7;text-align:center}
.mensaje-box .peligro-icono{font-size:3rem}

.botones-tel{display:flex;border-top:1px solid #ddd}
.btn-tel{flex:1;padding:16px 10px;border:none;font-size:0.9rem;font-weight:bold;cursor:pointer;transition:all 0.2s;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px}
.btn-tel:hover{filter:brightness(1.1)}
.btn-tel:disabled{opacity:0.4;cursor:default}
.btn-bloquear{background:#ff4757;color:white}
.btn-aceptar{background:#2ed573;color:white}

.contador-msgs{text-align:center;color:rgba(255,255,255,0.5);font-size:0.8rem;margin-top:8px}

.feedback-msg{padding:14px;border-radius:12px;margin-top:12px;display:none;animation:fadeIn 0.3s ease-out;font-weight:bold;text-align:center}
.feedback-msg.visible{display:block}
.feedback-msg.seguro{background:rgba(46,213,115,0.15);border:1px solid #2ed573;color:#2ed573}
.feedback-msg.peligro{background:rgba(255,71,87,0.15);border:1px solid #ff4757;color:#ff4757}

.resultado{display:none;text-align:center;padding:30px 20px}
.resultado.visible{display:block}
.resultado .emoji-g{font-size:4rem}

@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

@media(max-width:400px){
  .telefono{width:240px;height:420px;padding:14px}
  .mensaje-box{font-size:0.95rem;padding:14px}
  .btn-tel{font-size:0.8rem;padding:12px 6px}
}
</style>
</head>
<body>
<div class="container">
  <a href="../index.html" class="volver-btn" style="background:rgba(255,255,255,0.1);color:#eee">← Volver</a>

  <div class="header">
    <h1>⚡ Ciber-Protector</h1>
    <div class="sub">Ciudadanía Digital · Seguridad en internet</div>
  </div>

  <div class="progreso-wrap">
    <span class="progreso-label">📊 Progreso</span>
    <div class="progreso-bar"><div class="progreso-fill" id="progresoFill"></div></div>
    <span class="progreso-pct" id="progresoPct">0%</span>
  </div>

  <div class="instruccion">
    📱 Llegan mensajes a tu celular. Decide si son <strong style="color:#2ed573">seguros</strong> o <strong style="color:#ff4757">peligrosos</strong>.
  </div>

  <div id="mainContent"></div>
</div>

<script>
(function(){
'use strict';

var msgActual = 0;
var progreso = 0;
var aciertos = 0;

var mensajes = [
  {
    remitente: '👤 Desconocido',
    texto: '"Hola, soy un niño de tu edad. Mándame una foto de tu casa para ser amigos."',
    seguro: false,
    tip: 'Nunca envíes fotos, dirección ni ubicación a extraños en internet. Pueden usarlo para hacerte daño.',
    icono: '🚫'
  },
  {
    remitente: '👩🏽‍🏫 Profesora Marta',
    texto: '"Hola clase, les comparto un enlace a un video educativo sobre las plantas. ¡Aprendamos juntos!"',
    seguro: true,
    tip: 'Los enlaces que envían tus profesores y familiares de confianza son seguros. Siempre se puede preguntar antes de abrir.',
    icono: '✅'
  },
  {
    remitente: '📨 Mensaje de texto',
    texto: '"🎉 ¡Felicidades! Ganaste un celular último modelo y 5 millones de pesos. Clic aquí para reclamar: bit.ly/gane-facil"',
    seguro: false,
    tip: 'Si parece demasiado bueno para ser verdad, ¡es una trampa! Esto se llama phishing. Nunca hagas clic en enlaces sospechosos.',
    icono: '🎣'
  },
  {
    remitente: '😠 Compañero del salón',
    texto: '"Mira este meme horrible de [nombre de otro niño]. Vamos a burlarnos de él en el grupo."',
    seguro: false,
    tip: 'El ciberbullying duele tanto como el bullying presencial. Bloquea el mensaje y avisa a un profesor o a tus padres.',
    icono: '🛑'
  },
  {
    remitente: '👨‍👩‍👧‍👦 Grupo familiar',
    texto: '"Hoy llega el tío José de viaje. Vamos a hacer una videollamada a las 6pm para saludarlo."',
    seguro: true,
    tip: 'Las videollamadas con la familia son seguras y divertidas. Internet también sirve para mantenernos cerca de quienes queremos.',
    icono: '📹'
  }
];

function init(){
  cargarMensaje();
  actualizarProgreso();
}

function cargarMensaje(){
  if(msgActual >= mensajes.length){
    mostrarFinal();
    return;
  }
  var m = mensajes[msgActual];
  var html = '<div style="text-align:center;margin-bottom:8px"><span class="puntos-display">🛡️ <span id="aciertosCount">' + aciertos + '</span> / ' + mensajes.length + '</span></div>';
  html += '<div class="telefono">';
  html += '<div class="notch"></div>';
  html += '<div class="pantalla">';
  html += '<div class="app-header">💬 Mensaje nuevo</div>';
  html += '<div class="mensaje-box">';
  html += '<div class="remitente">' + m.remitente + '</div>';
  html += '<div class="peligro-icono">' + m.icono + '</div>';
  html += '<div class="burbuja">' + m.texto + '</div>';
  html += '</div>';
  html += '<div class="botones-tel">';
  html += '<button class="btn-tel btn-bloquear" id="btnBloquear" onclick="responder(false)">🚫 Bloquear</button>';
  html += '<button class="btn-tel btn-aceptar" id="btnAceptar" onclick="responder(true)">✅ Aceptar</button>';
  html += '</div>';
  html += '</div></div>';
  html += '<div class="contador-msgs">Mensaje ' + (msgActual + 1) + ' / ' + mensajes.length + '</div>';
  html += '<div class="feedback-msg" id="feedbackMsg"></div>';
  document.getElementById('mainContent').innerHTML = html;
}

function responder(accion){
  var btns = document.querySelectorAll('.btn-tel');
  btns.forEach(function(b){ b.disabled = true; });

  var m = mensajes[msgActual];
  var fb = document.getElementById('feedbackMsg');

  if(accion === m.seguro){
    fb.className = 'feedback-msg visible seguro';
    fb.innerHTML = '✅ ¡Correcto! ' + m.tip;
    aciertos++;
    progreso = Math.min(100, Math.round((aciertos / mensajes.length) * 100));
    guardarProgreso();
    actualizarProgreso();
    hablar('¡Correcto! ' + m.tip);
    msgActual++;
    if(aciertos >= mensajes.length){
      guardarDiario();
    }
    setTimeout(function(){ cargarMensaje(); }, 2800);
  } else {
    fb.className = 'feedback-msg visible peligro';
    fb.innerHTML = '⚠️ ¡Cuidado! ' + m.tip;
    hablar('Cuidado. ' + m.tip + ' Inténtalo de nuevo.');
    setTimeout(function(){
      btns.forEach(function(b){ b.disabled = false; });
      fb.className = 'feedback-msg';
      fb.innerHTML = '';
    }, 3000);
  }
}

function mostrarFinal(){
  var html = '<div class="resultado visible">';
  html += '<div class="emoji-g">📱🔒</div>';
  html += '<h2 style="color:#4fc3f7">¡Teléfono Seguro!</h2>';
  html += '<p style="font-size:1.1rem">' + aciertos + ' / ' + mensajes.length + ' aciertos</p>';
  if(aciertos >= 3){
    html += '<div style="margin:15px 0;font-size:3rem">🏅</div>';
    html += '<p style="font-weight:bold;color:#2ed573">¡Escudo Digital!</p>';
  }
  html += '<div style="background:rgba(255,255,255,0.08);border-radius:14px;padding:14px;margin:16px 0;text-align:left;font-size:0.9rem">';
  html += '<strong style="color:#4fc3f7">🔐 Reglas de oro:</strong><br>'
  html += '• No compartas datos personales con extraños<br>';
  html += '• No hagas clic en enlaces sospechosos<br>';
  html += '• Bloquea el ciberbullying y avisa a un adulto<br>';
  html += '• Si algo te hace sentir incómodo, ¡di NO!';
  html += '</div>';
  html += '<div style="margin-top:15px">';
  html += '<button class="btn btn-primario" onclick="location.reload()">🔄 Repetir</button>';
  html += '<a href="../index.html" class="btn btn-secundario" style="text-decoration:none">← Volver</a>';
  html += '</div></div>';
  document.getElementById('mainContent').innerHTML = html;
}

function actualizarProgreso(){
  document.getElementById('progresoFill').style.width = progreso + '%';
  document.getElementById('progresoPct').textContent = progreso + '%';
}

function guardarProgreso(){
  try { localStorage.setItem('dig401_progreso', progreso); } catch(e){}
}

function guardarDiario(){
  try {
    if(typeof Diario !== 'undefined'){
      Diario.registrar('dig-401', 'modulo_completado', { puntos: progreso, estrellas: Math.min(3, Math.floor(aciertos/2)) }, 'Ciber-Protector', '⚡');
    }
  } catch(e){}
}

function hablar(texto){
  if('speechSynthesis' in window){
    window.speechSynthesis.cancel();
    var u = new SpeechSynthesisUtterance(texto);
    u.lang = 'es-ES';
    u.rate = 0.9;
    window.speechSynthesis.speak(u);
  }
}

init();

})();
</script>
</body>
</html>
