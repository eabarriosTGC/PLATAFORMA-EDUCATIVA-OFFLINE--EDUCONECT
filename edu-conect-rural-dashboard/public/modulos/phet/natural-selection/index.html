<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Selección Natural - PhET</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #1a1a2e;
      color: #eee;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }
    .toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 16px;
      background: #16213e;
      border-bottom: 2px solid #0f3460;
      min-height: 48px;
      flex-shrink: 0;
    }
    .btn-back {
      background: #0f3460;
      color: #e94560;
      border: 1px solid #e94560;
      padding: 6px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: background 0.2s;
    }
    .btn-back:hover { background: #e94560; color: #fff; }
    .title-bar {
      flex: 1;
      font-size: 16px;
      font-weight: 600;
      color: #a8dadc;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .progress-container {
      width: 180px;
      height: 8px;
      background: #0f3460;
      border-radius: 4px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #e94560, #f39c12, #2ecc71);
      border-radius: 4px;
      transition: width 0.3s ease;
    }
    .badge {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
      background: #27ae60;
      color: #fff;
      font-weight: 600;
    }
    .sim-frame {
      flex: 1;
      border: none;
      width: 100%;
      background: #fff;
    }
    .loading-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #1a1a2e;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s;
    }
    .loading-overlay.hidden { opacity: 0; pointer-events: none; }
    .spinner {
      width: 48px; height: 48px;
      border: 4px solid #0f3460;
      border-top: 4px solid #27ae60;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
  </div>
  <div class="toolbar">
    <a href="../menu.html" class="btn-back">← Volver al menú</a>
    <span class="title-bar">🧬 Selección Natural</span>
    <span class="badge">Biología</span>
    <div class="progress-container">
      <div class="progress-bar" id="progressBar"></div>
    </div>
  </div>
  <iframe class="sim-frame" id="simFrame" src="natural-selection_es.html" allowfullscreen></iframe>

  <script>
    const progressBar = document.getElementById('progressBar');
    const loadingOverlay = document.getElementById('loadingOverlay');
    const simFrame = document.getElementById('simFrame');
    let progress = 0;
    const interval = setInterval(() => {
      if (progress < 90) {
        progress += Math.random() * 15;
        if (progress > 90) progress = 90;
        progressBar.style.width = progress + '%';
      }
    }, 400);
    simFrame.addEventListener('load', () => {
      progressBar.style.width = '100%';
      clearInterval(interval);
      setTimeout(() => { loadingOverlay.classList.add('hidden'); }, 600);
    });
    setTimeout(() => {
      if (!loadingOverlay.classList.contains('hidden')) {
        progressBar.style.width = '100%';
        loadingOverlay.classList.add('hidden');
        clearInterval(interval);
      }
    }, 10000);
  </script>
</body>
</html>
