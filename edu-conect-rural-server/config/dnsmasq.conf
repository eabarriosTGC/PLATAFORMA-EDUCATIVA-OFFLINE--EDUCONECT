# dnsmasq.conf — Servidor DHCP + DNS local para portal cautivo
# EduConect Rural — Plataforma educativa offline para Raspberry Pi
# Ruta: /etc/dnsmasq.conf (copiado desde aquí)
#
# Este archivo configura:
#   1. Servidor DHCP en rango 10.0.0.10-100 para hasta 30+ dispositivos
#   2. Redirección de TODO el tráfico DNS al servidor local (portal cautivo)
#   3. Dominio local educonect.local

# ── Interfaz de red ──────────────────────────────────────────────────
# Solo escuchar en wlan0 (no interferir con otras interfaces)
interface=wlan0

# No escuchar en interfaces no especificadas (seguridad)
bind-interfaces

# ── Servidor DHCP ────────────────────────────────────────────────────
# Rango: 10.0.0.10 a 10.0.0.100, máscara 255.255.255.0, TTL 24h
# 91 direcciones disponibles para estudiantes
dhcp-range=10.0.0.10,10.0.0.100,255.255.255.0,24h

# Tiempo de concesión: 24 horas (los dispositivos no cambian frecuentemente)
dhcp-lease-max=50

# Archivo de leases persistente (sobrevive reinicios)
dhcp-leasefile=/var/lib/misc/dnsmasq.leases

# ── Opciones DHCP ────────────────────────────────────────────────────
# Gateway (router) = 10.0.0.1 (la propia Raspberry Pi)
dhcp-option=3,10.0.0.1

# DNS server = 10.0.0.1 (el propio dnsmasq resuelve localmente)
dhcp-option=6,10.0.0.1

# Tiempo de renovación
dhcp-option=51,86400  # 24 horas en segundos

# ── Dominio local ────────────────────────────────────────────────────
# Dominio local para la red
domain=educonect.local

# Resolver educonect.local -> 10.0.0.1 (la Raspberry Pi)
address=/educonect.local/10.0.0.1

# ── PORTAL CAUTIVO: Redirigir todo el tráfico DNS ────────────────────
# Cualquier dominio que intenten resolver los estudiantes se redirige
# al servidor local. Así, aunque intenten acceder a google.com, serán
# llevados a la plataforma offline.
address=/#/10.0.0.1

# ── No reenviar consultas al exterior ────────────────────────────────
# No hay upstream DNS — todo se resuelve localmente (modo offline)
no-resolv

# Puerto DNS estándar
port=53

# ── Cache ────────────────────────────────────────────────────────────
# Cache de 150 entradas (suficiente para red local)
cache-size=150

# Servidor autoritativo (responde a consultas de cualquier dominio)
# Necesario para el funcionamiento completo del portal cautivo
local-ttl=86400
neg-ttl=86400
