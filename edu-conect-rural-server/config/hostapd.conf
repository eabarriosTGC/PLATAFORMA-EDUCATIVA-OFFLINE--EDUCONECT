# hostapd.conf — Configuración del punto de acceso WiFi
# EduConect Rural — Plataforma educativa offline para Raspberry Pi
# Ruta: /etc/hostapd/hostapd.conf (copiado desde aquí)
#
# SSID y contraseña configurables mediante variables de entorno:
#   SSID     (default: "EduConect Rural")
#   PASSWORD (default: "educonect2026")

# ── Interfaz de red ──────────────────────────────────────────────────
interface=wlan0

# Driver nl80211 (estándar para Raspberry Pi con firmware brcmfmac)
driver=nl80211

# ── Identificación de la red ─────────────────────────────────────────
# SSID: Nombre visible de la red WiFi
ssid=${SSID:-EduConect Rural}

# Modo: 'g' = 2.4 GHz solamente (máxima compatibilidad con dispositivos rurales)
# Dispositivos antiguos (Android 4, tablets genéricas, laptops viejas) solo soportan 2.4GHz
hw_mode=g

# Canal 6 — Centro de la banda de 2.4GHz, mínima interferencia
# Canales recomendados: 1, 6, 11 (no se superponen entre sí)
channel=6

# ── Rendimiento y compatibilidad ─────────────────────────────────────
# Desactivar WMM (Wi-Fi Multimedia) para máxima compatibilidad
# WMM puede causar problemas con dispositivos muy antiguos
wmm_enabled=1

# Soporte para 30+ clientes simultáneos
# Aumenta el número máximo de estaciones asociadas
max_num_sta=50

# Habilitar sondas de país para ajustar potencia
country_code=ES

# ── Seguridad WPA2-PSK ──────────────────────────────────────────────
# Control de acceso MAC: desactivado (cualquier dispositivo puede conectarse)
macaddr_acl=0

# Algoritmos de autenticación: 1 = solo Open System
auth_algs=1

# No ocultar SSID (visible para todos los dispositivos)
ignore_broadcast_ssid=0

# WPA2 (IEEE 802.11i/RSN)
wpa=2

# Contraseña de la red WiFi
wpa_passphrase=${PASSWORD:-educonect2026}

# Key management: WPA-PSK (pre-shared key, modo personal)
wpa_key_mgmt=WPA-PSK

# Cifrado: TKIP para compatibilidad, CCMP para seguridad
# Se incluyen ambos para dar soporte tanto a dispositivos antiguos como modernos
wpa_pairwise=TKIP
rsn_pairwise=CCMP

# ── Opciones avanzadas ───────────────────────────────────────────────
# Beacon interval: 100 ms (valor predeterminado, balance entre batería y velocidad)
beacon_int=100

# DTIM period: 2 (cada 2 beacons, mejora eficiencia energética)
dtim_period=2

# RTS threshold: 2347 (desactivado, innecesario para redes pequeñas)
rts_threshold=2347

# Fragment threshold: 2346 (desactivado, innecesario para redes pequeñas)
fragm_threshold=2346
