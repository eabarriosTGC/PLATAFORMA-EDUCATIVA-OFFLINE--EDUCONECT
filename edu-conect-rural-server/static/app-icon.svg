      <stop offset="0%" style="stop-color:#4a2c17"/>
      <stop offset="100%" style="stop-color:#6b3f2a"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Book -->
  <g transform="translate(120,160)">
    <rect x="0" y="0" width="200" height="240" rx="12" fill="#fdf8f0" stroke="#c45a3c" stroke-width="6"/>
    <rect x="20" y="20" width="160" height="6" rx="3" fill="#c45a3c"/>
    <rect x="20" y="40" width="140" height="6" rx="3" fill="#c45a3c" opacity="0.6"/>
    <rect x="20" y="60" width="150" height="6" rx="3" fill="#c45a3c" opacity="0.4"/>
    <rect x="20" y="80" width="120" height="6" rx="3" fill="#c45a3c" opacity="0.3"/>
    <rect x="20" y="110" width="130" height="6" rx="3" fill="#c45a3c" opacity="0.5"/>
    <rect x="20" y="130" width="100" height="6" rx="3" fill="#c45a3c" opacity="0.3"/>
    <rect x="20" y="160" width="140" height="6" rx="3" fill="#c45a3c" opacity="0.4"/>
    <rect x="20" y="180" width="110" height="6" rx="3" fill="#c45a3c" opacity="0.3"/>
