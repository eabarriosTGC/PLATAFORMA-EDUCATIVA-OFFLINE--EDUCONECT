    <path d="M-30,-20 Q10,-60 50,-20" opacity="0.75"/>
    <circle cx="20" cy="5" r="12" fill="#5a7a62" stroke="none"/>
  </g>
  <!-- "E" letter -->
  <text x="380" y="470" font-family="Arial,sans-serif" font-size="40" font-weight="bold" fill="#fdf8f0" text-anchor="middle">E</text>
