<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#D4322F">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="manifest" href="/manifest.json">
<link rel="icon" href="/app-icon.svg" type="image/svg+xml">
<title>Diccionario Offline — EduConect Rural</title>
<script>if('serviceWorker'in navigator){navigator.serviceWorker.register('/sw.js',{scope:'/'})}</script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#FFFAF2;
  --txt:#2C1810;
  --primary:#D4322F;
  --primary-dark:#a84a30;
  --secondary:#2D9D4E;
  --sand-100:#f0e6d0;
  --sand-200:#e0d0b0;
  --white:#fff;
  --shadow:0 2px 12px rgba(74,44,23,0.08);
  --radius:12px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh}
header{background:linear-gradient(135deg,#4a2c17,#6b3f2a);color:#fff;padding:1.5rem 1rem;text-align:center}
header h1{font-size:1.6rem;margin-bottom:.3rem}
header p{font-size:.9rem;opacity:.85}
main{max-width:720px;margin:0 auto;padding:1rem}
.search-box{display:flex;gap:8px;margin:1rem 0;position:relative}
.search-box input{flex:1;padding:14px 16px;border:2px solid var(--sand-200);border-radius:var(--radius);font-size:1.05rem;background:var(--white);outline:none;transition:border-color .2s}
.search-box input:focus{border-color:var(--primary)}
.search-box button{padding:14px 20px;background:var(--primary);color:#fff;border:none;border-radius:var(--radius);font-size:1rem;cursor:pointer;font-weight:600;transition:background .15s}
.search-box button:hover{background:var(--primary-dark)}

/* Autocomplete dropdown */
.suggestions{position:absolute;top:100%;left:0;right:0;background:var(--white);border:2px solid var(--sand-200);border-top:none;border-radius:0 0 var(--radius) var(--radius);z-index:10;max-height:200px;overflow-y:auto;display:none;box-shadow:var(--shadow)}
.suggestions div{padding:10px 16px;cursor:pointer;border-bottom:1px solid var(--sand-100);transition:background .1s}
.suggestions div:hover,.suggestions div.active{background:var(--sand-100)}
.suggestions div:last-child{border-bottom:none}

/* Palabra del día */
.palabra-dia{background:var(--white);border-radius:var(--radius);padding:1rem;margin:1rem 0;box-shadow:var(--shadow);border-left:4px solid var(--secondary)}
.palabra-dia .label{font-size:.75rem;text-transform:uppercase;letter-spacing:1px;color:var(--secondary);font-weight:700}
.palabra-dia .palabra{font-size:1.3rem;font-weight:700;color:var(--primary);margin:.3rem 0}
.palabra-dia .def{font-size:.95rem;line-height:1.5;color:#555}

/* Resultados */
#resultados{margin-top:1rem}
.result-item{background:var(--white);border-radius:var(--radius);padding:1.2rem;margin-bottom:1rem;box-shadow:var(--shadow);animation:fadeIn .2s}
.result-item h3{font-size:1.2rem;color:var(--primary);margin-bottom:.3rem}
.result-item .tipo{font-size:.75rem;color:#888;text-transform:uppercase;letter-spacing:.5px;background:var(--sand-100);padding:2px 8px;border-radius:4px;display:inline-block;margin-bottom:.5rem}
.result-item .def{font-size:.95rem;line-height:1.6;margin-bottom:.6rem}
.result-item .sinonimos{font-size:.85rem;color:var(--secondary)}
.result-item .sinonimos strong{color:var(--txt)}
.result-item .relacionadas{font-size:.85rem;color:#888;margin-top:.3rem}
.result-item .coincidencia{font-size:.7rem;color:#aaa;float:right}

/* Categorías */
.categorias{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:.5rem}
.categoria-tag{padding:4px 10px;border-radius:20px;font-size:.75rem;font-weight:600;cursor:pointer;border:2px solid var(--sand-200);background:var(--white);transition:all .15s}
.categoria-tag.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.categoria-tag:hover{background:var(--sand-100)}

.placeholder{text-align:center;padding:3rem 1rem;color:#999}
.placeholder .icon{font-size:3rem;margin-bottom:1rem}
.placeholder p{font-size:.95rem}
.placeholder .sub{font-size:.8rem;margin-top:.5rem}
.loading{text-align:center;padding:2rem;color:#999}
.error{background:#fff0f0;border:1px solid #ecc;border-radius:var(--radius);padding:1rem;color:#c33;margin:1rem 0}

/* Footer nav */
.nav-bar{display:flex;justify-content:center;gap:1rem;padding:.8rem;background:var(--white);border-top:1px solid var(--sand-200);margin-top:2rem}
.nav-bar a{color:var(--primary);text-decoration:none;font-size:.9rem;font-weight:500}
.nav-bar a:hover{text-decoration:underline}

@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<header>
  <h1>📖 Diccionario Offline</h1>
  <p>Consulta palabras, sinónimos, wayuunaiki y más — sin internet</p>
</header>
<main>
  <div class="search-box" style="position:relative">
    <input type="text" id="buscador" placeholder="Busca una palabra..." autofocus>
    <button onclick="buscar()">🔍</button>
    <div class="suggestions" id="sugerencias"></div>
  </div>

  <div class="categorias" id="filtros">
    <span class="categoria-tag active" data-cat="">Todas</span>
    <span class="categoria-tag" data-cat="general">Español</span>
    <span class="categoria-tag" data-cat="sinonimos">Sinónimos</span>
    <span class="categoria-tag" data-cat="wayuunaiki">Wayuunaiki</span>
    <span class="categoria-tag" data-cat="verbos">Verbos</span>
  </div>

  <div id="resultados">
    <div class="palabra-dia" id="palabra-dia"></div>
    <div id="lista-resultados"></div>
  </div>

  <div class="nav-bar">
    <a href="/">← Inicio</a>
    <span style="color:#aaa;cursor:default">Wikipedia (sin datos)</span>
    <a href="/modulos/">Módulos</a>
    <a href="/app/">Dashboard</a>
  </div>
</main>

<script>
let categoriaActiva = '';
let timeoutAutocomplete = null;
const input = document.getElementById('buscador');
const sugerencias = document.getElementById('sugerencias');
const lista = document.getElementById('lista-resultados');
const pdia = document.getElementById('palabra-dia');

// Palabra del día al cargar
fetch('/api/diccionario/palabra-dia')
  .then(r => r.json())
  .then(d => {
    pdia.innerHTML = `
      <div class="label">✨ Palabra del Día</div>
      <div class="palabra">${esc(d.palabra||'')}</div>
      <div class="def">${esc(d.definicion||'')}</div>
    `;
  }).catch(() => {});

// Filtros de categoría
document.getElementById('filtros').addEventListener('click', e => {
  const tag = e.target.closest('.categoria-tag');
  if (!tag) return;
  document.querySelectorAll('.categoria-tag').forEach(t => t.classList.remove('active'));
  tag.classList.add('active');
  categoriaActiva = tag.dataset.cat;
  if (input.value.trim()) buscar();
});

// Autocomplete
input.addEventListener('input', () => {
  clearTimeout(timeoutAutocomplete);
  const q = input.value.trim();
  if (!q) { sugerencias.style.display = 'none'; return; }
  timeoutAutocomplete = setTimeout(() => {
    fetch('/api/diccionario/sugerir?q=' + encodeURIComponent(q) + '&limite=8')
      .then(r => r.json())
      .then(d => {
        const items = d.sugerencias || [];
        sugerencias.innerHTML = '';
        sugerencias.style.display = items.length ? 'block' : 'none';
        items.forEach(s => {
          const div = document.createElement('div');
          div.textContent = s.palabra;
          div.onclick = () => { input.value = s.palabra; sugerencias.style.display = 'none'; buscar(); };
          sugerencias.appendChild(div);
        });
      }).catch(() => {});
  }, 200);
});
input.addEventListener('blur', () => setTimeout(() => sugerencias.style.display = 'none', 200));
input.addEventListener('keydown', e => { if (e.key === 'Enter') { sugerencias.style.display = 'none'; buscar(); } });

function buscar() {
  const q = input.value.trim();
  if (!q) return;
  lista.innerHTML = '<div class="loading">🔍 Buscando...</div>';
  const catParam = categoriaActiva ? '&categoria=' + encodeURIComponent(categoriaActiva) : '';
  fetch('/api/diccionario/buscar?q=' + encodeURIComponent(q) + '&limite=15' + catParam)
    .then(r => r.json())
    .then(d => {
      const res = d.resultados || [];
      if (!res.length) {
        lista.innerHTML = '<div class="placeholder"><div class="icon">🤔</div><p>No encontramos "<strong>' + esc(q) + '</strong>"</p><p class="sub">Prueba con otra palabra o revisa la ortografía</p></div>';
        return;
      }
      lista.innerHTML = '';
      res.forEach(r => {
        const div = document.createElement('div');
        div.className = 'result-item';
        let html = '<span class="coincidencia">' + (r.coincidencia === 'exacta' ? '✓ exacta' : '') + '</span>';
        html += '<h3>' + esc(r.palabra) + '</h3>';
        if (r.tipo) html += '<span class="tipo">' + esc(r.tipo) + '</span>';
        if (r.categoria === 'wayuunaiki') html += '<span class="tipo" style="background:#e0f0e0;color:#3a6a3a">🌵 Wayuunaiki</span>';
        if (r.categoria === 'sinonimos') html += '<span class="tipo" style="background:#e8e0f0;color:#6a3a8a">🔗 Sinónimos</span>';
        if (r.categoria === 'verbos') html += '<span class="tipo" style="background:#f0e8d0;color:#8a6a2a">📝 Verbo</span>';
        if (r.definicion) html += '<div class="def">' + esc(r.definicion) + '</div>';
        if (r.sinonimos) html += '<div class="sinonimos"><strong>Sinónimos:</strong> ' + esc(r.sinonimos).replace(/\|/g, ', ') + '</div>';
        if (r.antonimos) html += '<div class="sinonimos"><strong>Antónimos:</strong> ' + esc(r.antonimos).replace(/\|/g, ', ') + '</div>';
        if (r.relacionadas) html += '<div class="relacionadas"><strong>Formas:</strong> ' + esc(r.relacionadas).replace(/\|/g, ' · ') + '</div>';
        div.innerHTML = html;
        lista.appendChild(div);
      });
    })
    .catch(err => {
      lista.innerHTML = '<div class="error">❌ Error al buscar: ' + esc(err.message) + '</div>';
    });
}

function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// Al cargar, mostrar palabra del día
// Enfocar input
input.focus();
</script>
</body>
</html>
