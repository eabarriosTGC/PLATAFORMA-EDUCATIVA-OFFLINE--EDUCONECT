<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patrones Wayuu - EduConect Rural</title>
    <link rel="stylesheet" href="../estilos-globales.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="fondo-deserto">
        <div class="sol"></div>
        <div class="nube nube-1"></div>
        <div class="nube nube-2"></div>
    </div>

    <header class="header-modulo">
        <button class="btn-volver" onclick="location.href='../index.html'">← Volver</button>
        <h1>🎨 Patrones Wayuu</h1>
        <p>Completa los diseños de chinchorros y mochilas</p>
    </header>

    <div class="puntaje">
        <div class="puntaje-item estrellas">⭐ <span id="estrellas">0</span></div>
        <div class="puntaje-item aciertos">✅ <span id="aciertos">0</span>/<span id="total">5</span></div>
    </div>

    <div class="barra-progreso">
        <div class="barra-progreso-fill" id="barra"></div>
    </div>

    <main class="area-juego">
        <div class="instruccion-patron" id="instruccion">
            Observa el patrón y elige el color que <strong>continúa la secuencia</strong>
        </div>

        <div class="telar-container">
            <div class="telar-marco">
                <div class="telar-titulo">🧶 Chinchorro Wayuu</div>
                <div class="secuencia-fila" id="secuencia"></div>
                <div class="flecha-continua">↓ ¿Qué sigue?</div>
                <div class="casilla-vacia" id="casilla-vacia">
                    <span class="signo-pregunta">?</span>
                </div>
            </div>
        </div>

        <div class="opciones-colores" id="opciones"></div>

        <div class="controles-conteo">
            <button class="btn-primario" id="btn-verificar" disabled>Verificar</button>
            <button class="btn-secundario" id="btn-siguiente" style="display:none;">Siguiente →</button>
        </div>

        <div class="mensaje-final" id="mensaje-final" style="display:none;">
            <h2>🎉 ¡Eres un verdadero tejedor Wayuu!</h2>
            <p>Completaste todos los patrones</p>
            <button class="btn-primario" onclick="location.reload()">Jugar otra vez</button>
        </div>
    </main>

    <footer class="footer-modulo">
        <p>EduConect Rural — Sin conexión a internet</p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
