<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sumas con Manipulativos - EduConect Rural</title>
    <link rel="stylesheet" href="../estilos-globales.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="fondo-deserto">
        <div class="sol"></div>
        <div class="nube nube-1"></div>
        <div class="nube nube-2"></div>
    </div>

    <header class="header-modulo">
        <button class="btn-volver" onclick="location.href='../index.html'">← Volver</button>
        <h1>➕ Sumas con Semillas</h1>
        <p>Arrastra las semillas para sumar como en la huerta</p>
    </header>

    <div class="puntaje">
        <div class="puntaje-item estrellas">⭐ <span id="estrellas">0</span></div>
        <div class="puntaje-item aciertos">✅ <span id="aciertos">0</span>/<span id="total">5</span></div>
    </div>

    <div class="barra-progreso">
        <div class="barra-progreso-fill" id="barra"></div>
    </div>

    <main class="area-juego">
        <div class="operacion-display" id="operacion">
            <div class="numero-box" id="num-a">?</div>
            <div class="operador">+</div>
            <div class="numero-box" id="num-b">?</div>
            <div class="operador">=</div>
            <div class="numero-box resultado" id="resultado">?</div>
        </div>

        <div class="zonas-suma">
            <div class="zona-monton" id="zona-a">
                <div class="zona-label">Grupo 1</div>
                <div class="zona-area" id="area-a"></div>
                <div class="zona-contador">Llevas: <span id="cont-a">0</span></div>
            </div>

            <div class="zona-mas">+</div>

            <div class="zona-monton" id="zona-b">
                <div class="zona-label">Grupo 2</div>
                <div class="zona-area" id="area-b"></div>
                <div class="zona-contador">Llevas: <span id="cont-b">0</span></div>
            </div>

            <div class="zona-igual">=</div>

            <div class="zona-monton zona-total" id="zona-total">
                <div class="zona-label">Total</div>
                <div class="zona-area" id="area-total"></div>
                <div class="zona-contador">Total: <span id="cont-total">0</span></div>
            </div>
        </div>

        <div class="deposito-semillas">
            <div class="deposito-label">🌱 Arrastra semillas desde aquí:</div>
            <div class="semillas-pool" id="pool">
                <!-- Se generan dinámicamente -->
            </div>
        </div>

        <div class="controles-conteo">
            <button class="btn-primario" id="btn-verificar" disabled>Verificar</button>
            <button class="btn-secundario" id="btn-limpiar">Limpiar</button>
            <button class="btn-secundario" id="btn-siguiente" style="display:none;">Siguiente →</button>
        </div>

        <div class="mensaje-final" id="mensaje-final" style="display:none;">
            <h2>🎉 ¡Eres un experto sumando!</h2>
            <p>Completaste todas las sumas</p>
            <button class="btn-primario" onclick="location.reload()">Jugar otra vez</button>
        </div>
    </main>

    <footer class="footer-modulo">
        <p>EduConect Rural — Sin conexión a internet</p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
